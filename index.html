<title>就労選択支援アセスメント</title>
<style>
  :root{
    --accent:#1f5fae; --accent-press:#184c8c; --accent-weak:#eaf2fb; --accent-line:#c7ddf3;
    --ink:#1b2532; --ink-2:#515c6b; --ink-3:#8b95a3;
    --line:#e4e8ee; --line-2:#eef1f5; --bg:#eef2f6; --panel:#fff; --field:#fafbfc;
    --r:14px; --r-sm:10px;
    --sh-sm:0 1px 2px rgba(22,33,52,.05); --sh:0 1px 3px rgba(22,33,52,.05),0 8px 24px rgba(22,33,52,.06);
    --A:#4f9d6b; --B:#4f8fc9; --C:#d49a3c; --D:#cf6a55;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",YuGothic,"Noto Sans JP",Meiryo,sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
  button{font-family:inherit;cursor:pointer;-webkit-appearance:none;-webkit-tap-highlight-color:transparent}
  input,select,textarea{font-family:inherit;-webkit-appearance:none;outline:none;font-size:16px;color:var(--ink)}
  textarea{resize:vertical}
  ::placeholder{color:#aeb6c0}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:6px}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
  ::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:#cfd6df;border-radius:5px}

  .shell{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
  header{display:flex;align-items:center;gap:12px;row-gap:9px;flex-wrap:wrap;padding:11px 20px;padding-top:calc(11px + env(safe-area-inset-top,0px));
    min-height:60px;background:rgba(255,255,255,.88);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);
    border-bottom:1px solid var(--line);flex:0 0 auto;position:sticky;top:0;z-index:40;box-shadow:var(--sh-sm)}
  .brand{display:flex;align-items:center;gap:11px;flex:0 0 auto}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(160deg,#2a6cc0,var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;letter-spacing:.04em;box-shadow:0 2px 8px rgba(31,95,174,.35)}
  .title{font-weight:700;font-size:15.5px;white-space:nowrap}
  .subjwrap{display:flex;align-items:center;gap:9px;flex:1 1 auto;min-width:160px}
  #subjectSelect{height:40px;padding:0 30px 0 13px;border:1px solid #d4dbe3;border-radius:10px;font-size:14px;background:var(--field);flex:1 1 auto;min-width:130px;max-width:230px;font-weight:600;color:var(--ink)}
  .hbtn{height:40px;padding:0 14px;border:1px solid #d4dbe3;border-radius:10px;background:#fff;font-size:13.5px;font-weight:600;color:var(--ink);transition:.15s}
  .hbtn:hover{background:#f4f7fb;border-color:#c2ccd7}.hbtn:active{transform:translateY(1px)}
  .hbtn.ghost{color:var(--ink-2);font-weight:500;border-color:#dde3ea}
  .hbtn.add{color:var(--accent);border-color:var(--accent-line)}.hbtn.add:hover{background:var(--accent-weak)}
  .hbtn.primary{border:none;background:var(--accent);color:#fff;font-weight:700;padding:0 18px;box-shadow:0 2px 8px rgba(31,95,174,.28)}.hbtn.primary:hover{background:var(--accent-press)}
  .hactions{display:flex;align-items:center;gap:9px;flex:0 0 auto}

  .tabs{display:none;gap:8px;overflow-x:auto;padding:11px 16px;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);flex:0 0 auto;-webkit-overflow-scrolling:touch;position:sticky;top:0;z-index:35}
  .pill{flex:0 0 auto;display:flex;align-items:center;gap:7px;padding:0 15px;height:42px;border-radius:21px;font-size:13.5px;font-weight:600;white-space:nowrap;border:1px solid var(--line);background:#fff;color:var(--ink-2);transition:.14s}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(31,95,174,.3)}
  .pill-num{width:19px;height:19px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#e9edf2;color:var(--ink-2)}
  .pill.active .pill-num{background:rgba(255,255,255,.26);color:#fff}

  .meta{display:flex;align-items:center;gap:18px;row-gap:11px;flex-wrap:wrap;padding:13px 22px;background:#fff;border-bottom:1px solid var(--line);flex:0 0 auto}
  .field{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:600;color:var(--ink-3)}
  .field input{height:38px;padding:0 12px;border:1px solid #d8dee5;border-radius:9px;font-size:14px;background:var(--field);font-weight:500;color:var(--ink)}
  .field input.nm{width:150px}.field input.dt{width:150px}.field .ad{font-weight:600;color:var(--ink-3)}

  .body{display:flex;flex:1}
  .sidebar{display:flex;flex-direction:column;gap:6px;width:270px;flex:0 0 auto;background:#f6f8fb;border-right:1px solid var(--line);overflow:auto;padding:16px 14px}
  .side-h{font-size:11px;font-weight:800;color:#9aa4b1;letter-spacing:.06em;padding:6px 6px 4px}
  .side-h.first{padding-top:0}
  .nav{display:flex;flex-direction:column;gap:8px;padding:12px 13px;border-radius:11px;border:1px solid transparent;cursor:pointer;transition:.14s}
  .nav:hover{background:#eef3f9}
  .nav.active{background:#fff;border-color:var(--accent-line);box-shadow:var(--sh-sm)}
  .nav-top{display:flex;align-items:center;gap:10px}
  .nav-num{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#e6ebf1;color:var(--ink-2);flex:0 0 auto}
  .nav.active .nav-num{background:var(--accent);color:#fff}
  .nav-name{font-size:13px;font-weight:600;flex:1;line-height:1.35}
  .nav-prog{font-size:11px;color:#9aa4b1;white-space:nowrap;font-weight:700;font-variant-numeric:tabular-nums}
  .nav-tick{font-size:13px;color:var(--A);font-weight:800;margin-left:auto}
  .nav-sum-ic{width:24px;height:24px;border-radius:7px;background:var(--accent-weak);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;flex:0 0 auto;font-weight:700}
  .navdiv{height:1px;background:var(--line);margin:8px 4px}
  .overall{margin-top:auto;padding:14px;border-radius:12px;background:#fff;border:1px solid var(--line);box-shadow:var(--sh-sm)}
  .overall-top{display:flex;justify-content:space-between;align-items:baseline}
  .overall-num{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
  .overall-sub{font-size:11px;color:#9aa4b1;margin-top:5px;font-weight:600}

  .main{flex:1;min-width:0;overflow:visible;padding:26px 30px;padding-bottom:calc(30px + env(safe-area-inset-bottom,0px));background:var(--bg)}
  .page{max-width:920px;margin:0 auto;animation:rise .26s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  .dhead{display:flex;align-items:flex-end;gap:14px;margin-bottom:8px}
  .dhead-num{min-width:42px;height:42px;padding:0 10px;border-radius:11px;background:linear-gradient(160deg,#2a6cc0,var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex:0 0 auto;box-shadow:0 3px 10px rgba(31,95,174,.3)}
  .dhead-name{font-size:19px;font-weight:800;line-height:1.25}
  .dhead-desc{font-size:12.5px;color:var(--ink-2);margin:2px 0 16px;padding-left:56px}
  .pill-tag{display:inline-block;font-size:11px;color:var(--accent);background:var(--accent-weak);border-radius:7px;padding:2px 9px;margin-left:9px;font-weight:700;vertical-align:middle}
  .pill-tag.sup{color:#7a4a28;background:#fbf4ec}

  .items{display:flex;flex-direction:column;gap:13px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh-sm)}
  .rate-q{font-size:15.5px;font-weight:700;margin-bottom:9px}
  .points{list-style:none;margin:0 0 11px;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:5px 16px}
  .points li{font-size:12px;color:var(--ink-2);line-height:1.45;display:flex;gap:7px}
  .points li b{flex:0 0 auto;width:16px;height:16px;border-radius:5px;color:#fff;font-size:10px;display:inline-flex;align-items:center;justify-content:center;margin-top:1px}
  .points li.lA b{background:var(--A)}.points li.lB b{background:var(--B)}.points li.lC b{background:var(--C)}.points li.lD b{background:var(--D)}
  .scale{display:flex;gap:9px}
  .opt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:54px;border-radius:11px;border:1.5px solid #d8dee5;background:#fff;color:var(--ink-2);transition:transform .08s,border-color .14s,background .14s,box-shadow .14s}
  .opt .lt{font-size:18px;font-weight:800;color:var(--ink)}
  .opt .wd{font-size:10.5px;font-weight:600}
  .opt:hover{border-color:#bcc8d4;background:#fafcff}.opt:active{transform:scale(.97)}
  .opt.sel{border-color:var(--c);background:var(--c);color:#fff;box-shadow:0 3px 12px rgba(22,33,52,.18)}
  .opt.sel .lt{color:#fff}
  .memo{margin-top:11px;width:100%;min-height:42px;padding:10px 12px;border:1px solid #e6ebf1;border-radius:10px;font-size:14px;background:var(--field);line-height:1.6}

  .form{display:flex;flex-direction:column;gap:16px}
  .ffield{display:flex;flex-direction:column;gap:7px}
  .ffield .fl{font-size:14px;font-weight:700}
  .ffield .fl small{font-weight:500;color:var(--ink-3);font-size:11.5px}
  .ffield textarea,.ffield input[type=text]{padding:11px 13px;border:1px solid #d8dee5;border-radius:11px;font-size:15px;line-height:1.6;background:var(--field)}
  .ffield textarea{min-height:64px}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{padding:9px 15px;border:1.5px solid #d8dee5;border-radius:22px;background:#fff;font-size:13.5px;font-weight:600;color:var(--ink-2);transition:.14s}
  .chip:hover{border-color:#bcc8d4}.chip:active{transform:scale(.97)}
  .chip.sel{background:var(--accent);border-color:var(--accent);color:#fff}

  /* 帳票 */
  .rep{max-width:940px;margin:0 auto;display:flex;flex-direction:column;gap:16px;animation:rise .26s}
  .pcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;box-shadow:var(--sh-sm)}
  .rep-h{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:2px solid var(--ink);padding-bottom:12px;margin-bottom:14px}
  .rep-t{font-size:20px;font-weight:800}
  .rep-k{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:.05em}
  .rep-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
  .rep-lab{font-size:11px;color:var(--ink-3);font-weight:600;margin-bottom:4px}
  .rep-val{font-size:14px;font-weight:600;border-bottom:1px solid var(--line-2);padding-bottom:5px;min-height:24px}
  .box-h{font-size:14px;font-weight:800;margin-bottom:13px}
  .box-h .pill-tag{margin-left:7px}
  .rectbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .rectbl th{background:#f4f7fb;color:var(--ink-2);font-weight:700;font-size:11.5px;text-align:left;padding:7px 9px;border:1px solid var(--line)}
  .rectbl td{padding:8px 9px;border:1px solid var(--line);vertical-align:top;line-height:1.5}
  .rectbl .c-item{width:20%;font-weight:600}
  .rectbl .c-pt{width:46%}
  .rectbl .c-ev{width:10%;text-align:center}
  .rectbl .c-cm{width:24%;color:var(--ink-2)}
  .pt{display:block;color:#b6bec8}
  .pt.on{color:var(--ink);font-weight:700}
  .pt .mk{display:inline-block;width:15px}
  .evbadge{display:inline-block;min-width:26px;padding:3px 6px;border-radius:7px;color:#fff;font-weight:800;font-size:13px}
  .dgroup-h{font-size:13px;font-weight:800;margin:4px 0 8px;color:var(--accent)}
  .echo-h{font-size:12.5px;font-weight:800;color:var(--ink-2);margin:13px 0 4px}.echo-h:first-of-type{margin-top:0}
  .echo{font-size:13.5px;line-height:1.7;white-space:pre-wrap}.echo.empty{color:#b6bec8}
  .tag{display:inline-block;font-size:12px;padding:5px 12px;border-radius:14px;background:var(--accent-weak);color:var(--accent);font-weight:700;margin:0 6px 6px 0}
  .note{width:100%;min-height:118px;padding:13px 15px;border:1px solid #e6ebf1;border-radius:11px;font-size:14.5px;line-height:1.75;background:var(--field)}
  .note.sm{min-height:62px}
  .disc{font-size:12px;color:#7a4a28;background:#fbf4ec;border:1px solid #ecd7bf;border-radius:11px;padding:11px 14px;margin-top:12px;line-height:1.65}
  .disc::before{content:"⚠ ";font-weight:700}
  .supdiv{border-top:2px dashed #c6cfd9;margin:6px 0 0;padding-top:6px}
  .suplabel{font-size:12px;font-weight:800;color:var(--ink-3);text-align:center;padding:8px 0}
  .refscore{display:flex;align-items:center;gap:12px;margin-bottom:11px}
  .refscore .nm{font-size:13px;flex:0 0 120px;font-weight:600}
  .refscore .bar{flex:1;height:9px;background:var(--line-2);border-radius:5px;overflow:hidden}
  .refscore .bar i{display:block;height:100%;border-radius:5px}
  .refscore .av{font-size:13px;font-weight:800;width:64px;text-align:right}
  .hintnote{font-size:11.5px;color:#9aa4b1;text-align:center;padding:6px 0 16px}

  @media (min-width:860px){.shell{height:100vh;overflow:hidden}.body{min-height:0}.main{overflow:auto}header{position:static}}
  @media (max-width:859px){.sidebar{display:none}.tabs{display:flex}.main{padding:18px 15px}.rep-grid{grid-template-columns:1fr 1fr}.points{grid-template-columns:1fr}}
  @media (max-width:559px){.title{font-size:14.5px}.meta{flex-direction:column;align-items:stretch;gap:11px;padding:14px 16px}.field{width:100%;flex-wrap:wrap}.field input{flex:1;height:44px}.rep-grid{grid-template-columns:1fr}
    .rectbl,.rectbl tbody,.rectbl tr,.rectbl td{display:block;width:100%!important}.rectbl thead{display:none}.rectbl td{border:none;padding:2px 0}.rectbl tr{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:9px}.rectbl .c-item{font-size:14px}}

  @page{margin:12mm}
  @media print{
    .no-print{display:none!important}.shell{height:auto!important;display:block!important}.body{display:block!important}
    .sidebar,.tabs,header{display:none!important}.main{overflow:visible!important;padding:0!important;background:#fff!important}
    body{background:#fff!important}.page,.rep{animation:none}.pcard{box-shadow:none!important;break-inside:avoid}
    .sup-print{break-before:page}.hintnote{display:none}
  }
</style>
</head>
<body>
<div class="shell">
  <header class="no-print">
    <div class="brand"><div class="logo">NEST</div><div class="title">就労選択支援アセスメント</div></div>
    <div class="subjwrap">
      <select id="subjectSelect"></select>
      <button class="hbtn add" id="btnNew">＋ 新規</button>
      <button class="hbtn ghost" id="btnDel">削除</button>
    </div>
    <div class="hactions">
      <button class="hbtn ghost" id="btnClear">入力をクリア</button>
      <button class="hbtn primary" id="btnPrint">帳票を印刷</button>
    </div>
  </header>

  <nav class="tabs no-print" id="tabs"></nav>

  <div class="meta no-print">
    <label class="field">対象者名<input id="inpName" class="nm" placeholder="氏名"></label>
    <label class="field">作業先<input id="inpWork" class="nm" placeholder="事業所・企業名"></label>
    <label class="field">就労担当事業所<input id="inpProv" class="nm" placeholder="例）NEST"></label>
    <label class="field">評価期間<input id="inpPs" class="dt" type="date"><span class="ad">〜</span><input id="inpPe" class="dt" type="date"></label>
    <label class="field">担当者<input id="inpStaff" class="nm" placeholder="担当者名"></label>
  </div>

  <div class="body">
    <aside class="sidebar no-print" id="sidebar"></aside>
    <main class="main" id="main"></main>
  </div>
</div>

<script>
(function(){
  "use strict";
  var KEY='nest_assessment_v4';

  /* 富士圏域共通様式 A/B/C/D（各項目に評価ポイント） */
  var LV=[{v:'A',word:'できる',color:'#4f9d6b'},{v:'B',word:'概ね',color:'#4f8fc9'},{v:'C',word:'不十分',color:'#d49a3c'},{v:'D',word:'できない',color:'#cf6a55'}];
  var LVMAP={A:4,B:3,C:2,D:1};
  function pts(it){return {A:it.a,B:it.b||'概ねできる',C:it.c||'適切にできない',D:it.d||'できない'};}

  var DOMAINS=[
    {id:'r1',no:'①',name:'基本的な労働習慣',short:'労働習慣',items:[
      {id:'r1a',name:'挨拶・返事・言葉遣い',a:'適切な挨拶・返事・言葉遣いができる'},
      {id:'r1b',name:'身だしなみ',a:'清潔感のある服装・髪型が維持できる'},
      {id:'r1c',name:'時間の意識',a:'時間を意識し、遅刻・欠席の連絡ができる'},
      {id:'r1d',name:'体調管理',a:'安定して働く体力があり、休息など体調管理ができる'}
    ]},
    {id:'r2',no:'②',name:'社会生活',short:'社会生活',items:[
      {id:'r2a',name:'報告・相談（質問）',a:'報告・連絡・相談ができる'},
      {id:'r2b',name:'表現・態度',a:'素直に話や指摘を受け入れられる'},
      {id:'r2c',name:'ルール・マナー',a:'状況に応じたルール・マナーを守れる'},
      {id:'r2d',name:'チームワーク・協調性',a:'周りとコミュニケーションをとりながら作業ができる'}
    ]},
    {id:'r3',no:'③',name:'職業スキル',short:'職業スキル',items:[
      {id:'r3a',name:'集中力',a:'課題に取り組む集中力がある',b:'概ねある',c:'ない'},
      {id:'r3b',name:'正確性',a:'指示通りに業務を行い、自分でミスに気づき修正ができる'},
      {id:'r3c',name:'作業速度・生産性',a:'効率よく、決められた時間内に業務を完了できる'},
      {id:'r3d',name:'パソコン',a:'入力速度が速く、正確にできる',d:'未実施',dna:true},
      {id:'r3e',name:'軽作業',a:'作業速度が速く、正確にできる',d:'未実施',dna:true},
      {id:'r3f',name:'コミュニケーション',a:'話を聞く姿勢・伝え方を適切にできる'}
    ]}
  ];
  var ALLITEMS=[];DOMAINS.forEach(function(d){d.items.forEach(function(it){it._dom=d;ALLITEMS.push(it);});});
  var TOTAL=ALLITEMS.length;

  /* 補足（支援用） */
  var HOPE_FIELDS=[
    {k:'history',label:'これまでの就労・実習・体験（職歴）',ph:'アルバイト・実習・前事業所など'},
    {k:'motive',label:'働く動機・目的',ph:'なぜ働きたいか（収入／生活リズム／人との関わり 等）'},
    {k:'wish',label:'希望する働き方・職種',ph:'やってみたい仕事、避けたい仕事を本人の言葉で'},
    {k:'condition',label:'希望する労働条件・通勤',ph:'勤務時間・日数、通勤手段 等'},
    {k:'request',label:'配慮してほしいこと（本人の希望）',ph:'本人が希望する配慮・苦手なこと'},
    {k:'strength',label:'強み・得意なこと',ph:'得意な作業・好きなこと・続けられること'}
  ];
  var INTENTS=['一般就労を目指したい','まず就労移行で力をつけたい','A型で働きながら','B型で自分のペースで','まだ決めかねている'];
  var ENV_CHIPS=['静かな環境','少人数・個別','決まった手順','マイペースで進められる','こまめな声かけ','短時間から','休憩を取りやすい','視覚的な指示'];
  var ENV_FIELDS=[
    {k:'envNote',label:'作業環境・配慮の具体',ph:'作業面／コミュニケーション面／時間・ペース面で必要な配慮'},
    {k:'commute',label:'通勤・移動の支援',ph:'通勤手段、移動の練習・支援の要否'},
    {k:'medical',label:'医療・生活面の支え',ph:'服薬・通院、生活面で支えになっている人・サービス'}
  ];
  var META=['name','work','prov','ps','pe','staff'];

  function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function uid(){return 's'+Date.now()+Math.floor(Math.random()*1000);}
  function normalize(s){
    s.id=s.id||uid();
    META.forEach(function(k){s[k]=s[k]||'';}); if(!s.ps)s.ps=today();
    s.disability=s.disability||'';
    s.rec=s.rec||{}; s.comments=s.comments||{}; s.soken=s.soken||'';
    s.hope=s.hope||{}; s.intents=s.intents||[]; s.envchips=s.envchips||[]; s.envtext=s.envtext||{}; s.understand=s.understand||'';
    return s;
  }
  function blank(){return normalize({id:uid()});}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function tx(v){return (v&&String(v).trim())?esc(v):'';}

  var state;
  function load(){
    try{var raw=localStorage.getItem(KEY);if(raw){var d=JSON.parse(raw);if(d&&d.subjects&&d.subjects.length){
      d.subjects.forEach(normalize);
      var cid=d.currentId&&d.subjects.some(function(s){return s.id===d.currentId;})?d.currentId:d.subjects[0].id;
      return {subjects:d.subjects,currentId:cid,view:'r1'};
    }}}catch(e){}
    var s=blank();return {subjects:[s],currentId:s.id,view:'r1'};
  }
  function save(){try{localStorage.setItem(KEY,JSON.stringify({subjects:state.subjects,currentId:state.currentId}));}catch(e){}}
  function cur(){return state.subjects.filter(function(s){return s.id===state.currentId;})[0]||state.subjects[0];}

  function domStat(d,sub){var rated=d.items.filter(function(it){return sub.rec[it.id];}).length;return {rated:rated,total:d.items.length};}
  function refAvg(d,sub){var vals=[];d.items.forEach(function(it){var v=sub.rec[it.id];if(v&&!(v==='D'&&it.dna))vals.push(LVMAP[v]);});return vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:null;}

  var $=function(id){return document.getElementById(id);};
  var elSel=$('subjectSelect'),elTabs=$('tabs'),elSide=$('sidebar'),elMain=$('main');
  var metaEls={name:$('inpName'),work:$('inpWork'),prov:$('inpProv'),ps:$('inpPs'),pe:$('inpPe'),staff:$('inpStaff')};

  function renderOptions(){
    elSel.innerHTML=state.subjects.map(function(s){var lbl=(s.name&&s.name.trim())?s.name:'（無題）';return '<option value="'+esc(s.id)+'"'+(s.id===state.currentId?' selected':'')+'>'+esc(lbl)+'</option>';}).join('');
  }
  function fillMeta(){var s=cur();META.forEach(function(k){metaEls[k].value=s[k]||'';});}

  var SUP=[{v:'hope',name:'希望・ニーズ'},{v:'env',name:'必要な配慮・環境'},{v:'self',name:'本人の受け止め'}];
  function renderSidebar(){
    var sub=cur();
    var rec=DOMAINS.map(function(d){var st=domStat(d,sub);
      return '<div class="nav'+(state.view===d.id?' active':'')+'" data-view="'+d.id+'"><div class="nav-top"><span class="nav-num">'+d.no+'</span><span class="nav-name">'+esc(d.name)+'</span><span class="nav-prog">'+st.rated+'/'+st.total+'</span></div></div>';
    }).join('');
    var sup=SUP.map(function(x){var f=supFilled(x.v,sub);
      return '<div class="nav'+(state.view===x.v?' active':'')+'" data-view="'+x.v+'"><div class="nav-top"><span class="nav-sum-ic">補</span><span class="nav-name">'+esc(x.name)+'</span>'+(f?'<span class="nav-tick">✓</span>':'')+'</div></div>';
    }).join('');
    var rated=DOMAINS.reduce(function(a,d){return a+domStat(d,sub).rated;},0);
    elSide.innerHTML='<div class="side-h first">実施記録（圏域共通様式）</div>'+rec
      +'<div class="side-h">補足（支援用）</div>'+sup
      +'<div class="navdiv"></div>'
      +'<div class="nav'+(state.view==='report'?' active':'')+'" data-view="report"><div class="nav-top"><span class="nav-sum-ic">▣</span><span class="nav-name">帳票・総評（提出用）</span></div></div>'
      +'<div class="overall"><div class="overall-top"><span style="font-size:12px;color:var(--ink-2);font-weight:600">評価の進捗</span><span class="overall-num">'+rated+' / '+TOTAL+'</span></div><div class="overall-sub">14項目（A/B/C/D）</div></div>';
  }
  function renderTabs(){
    var sub=cur();
    var t=DOMAINS.map(function(d){var st=domStat(d,sub);return '<button class="pill'+(state.view===d.id?' active':'')+'" data-view="'+d.id+'"><span class="pill-num">'+d.no+'</span>'+esc(d.short)+'</button>';}).join('');
    t+=SUP.map(function(x){return '<button class="pill'+(state.view===x.v?' active':'')+'" data-view="'+x.v+'">補 '+esc(x.name.replace('・ニーズ','').replace('必要な',''))+'</button>';}).join('');
    t+='<button class="pill'+(state.view==='report'?' active':'')+'" data-view="report">▣ 帳票</button>';
    elTabs.innerHTML=t;
  }
  function supFilled(v,sub){
    if(v==='hope')return HOPE_FIELDS.some(function(f){return sub.hope[f.k]&&sub.hope[f.k].trim();})||sub.intents.length>0||(sub.disability&&sub.disability.trim());
    if(v==='env')return ENV_FIELDS.some(function(f){return sub.envtext[f.k]&&sub.envtext[f.k].trim();})||sub.envchips.length>0;
    if(v==='self')return sub.understand&&sub.understand.trim();
    return false;
  }

  function renderMain(){
    var sub=cur(),v=state.view;
    if(v==='report')return renderReport(sub);
    if(v==='hope')return renderHope(sub);
    if(v==='env')return renderEnv(sub);
    if(v==='self')return renderSelf(sub);
    renderDomain(sub);
  }

  function renderDomain(sub){
    var d=DOMAINS.filter(function(x){return x.id===state.view;})[0]||DOMAINS[0];
    var cards=d.items.map(function(it){
      var p=pts(it),sel=sub.rec[it.id];
      var plist=LV.map(function(o){return '<li class="l'+o.v+'"><b>'+o.v+'</b>'+esc(p[o.v])+'</li>';}).join('');
      var btns=LV.map(function(o){return '<button class="opt'+(sel===o.v?' sel':'')+'" data-item="'+it.id+'" data-val="'+o.v+'"'+(sel===o.v?' style="--c:'+o.color+'"':'')+'><span class="lt">'+o.v+'</span><span class="wd">'+(o.v==='D'&&it.dna?'未実施':o.word)+'</span></button>';}).join('');
      return '<div class="card"><div class="rate-q">'+esc(it.name)+'</div><ul class="points">'+plist+'</ul><div class="scale">'+btns+'</div>'
        +'<textarea class="memo" data-cm="'+it.id+'" placeholder="コメント（具体的な様子・根拠）">'+esc(sub.comments[it.id]||'')+'</textarea></div>';
    }).join('');
    elMain.innerHTML='<div class="page"><div class="dhead"><div class="dhead-num">'+d.no+'</div><div class="dhead-name">'+esc(d.name)+'<span class="pill-tag">圏域様式</span></div></div>'
      +'<div class="dhead-desc">作業場面等の観察に基づき、各項目を A〜D で評価します（評価ポイント参照）。</div>'
      +'<div class="items">'+cards+'</div></div>';
  }

  function renderHope(sub){
    var fields=HOPE_FIELDS.map(function(f){return '<div class="ffield"><span class="fl">'+esc(f.label)+'</span><textarea data-hope="'+f.k+'" placeholder="'+esc(f.ph)+'">'+esc(sub.hope[f.k]||'')+'</textarea></div>';}).join('');
    var chips=INTENTS.map(function(t){return '<button class="chip'+(sub.intents.indexOf(t)>=0?' sel':'')+'" data-intent="'+esc(t)+'">'+esc(t)+'</button>';}).join('');
    elMain.innerHTML='<div class="page"><div class="dhead"><div class="dhead-num" style="font-size:13px">補</div><div class="dhead-name">就労に関する希望・ニーズ<span class="pill-tag sup">支援用補足</span></div></div>'
      +'<div class="dhead-desc">本人がどう働きたいか・経験。本人本位の選択を支える参考情報（提出様式の対象外）。</div>'
      +'<div class="card"><div class="form">'
      +'<div class="ffield"><span class="fl">障害の種類・程度／手帳等</span><input type="text" data-meta="disability" placeholder="例）療育手帳B／精神2級" value="'+esc(sub.disability||'')+'"></div>'
      +fields+'<div class="ffield"><span class="fl">本人が関心を示した方向</span><div class="chips">'+chips+'</div></div></div></div></div>';
  }
  function renderEnv(sub){
    var chips=ENV_CHIPS.map(function(t){return '<button class="chip'+(sub.envchips.indexOf(t)>=0?' sel':'')+'" data-envchip="'+esc(t)+'">'+esc(t)+'</button>';}).join('');
    var fields=ENV_FIELDS.map(function(f){return '<div class="ffield"><span class="fl">'+esc(f.label)+'</span><textarea data-env="'+f.k+'" placeholder="'+esc(f.ph)+'">'+esc(sub.envtext[f.k]||'')+'</textarea></div>';}).join('');
    elMain.innerHTML='<div class="page"><div class="dhead"><div class="dhead-num" style="font-size:13px">補</div><div class="dhead-name">就労継続のための環境・必要な配慮<span class="pill-tag sup">支援用補足</span></div></div>'
      +'<div class="dhead-desc">どんな環境・支援があれば力を発揮し、働き続けられるか（提出様式の対象外）。</div>'
      +'<div class="card"><div class="form"><div class="ffield"><span class="fl">あると働きやすい環境・配慮 <small>／ 当てはまるものを選択</small></span><div class="chips">'+chips+'</div></div>'+fields+'</div></div></div>';
  }
  function renderSelf(sub){
    elMain.innerHTML='<div class="page"><div class="dhead"><div class="dhead-num" style="font-size:13px">補</div><div class="dhead-name">本人の受け止め・自己理解<span class="pill-tag sup">支援用補足</span></div></div>'
      +'<div class="dhead-desc">アセスメント結果を本人がどう受け止めたか。本人本位の確認（提出様式の対象外）。</div>'
      +'<div class="card"><div class="ffield"><span class="fl">本人の受け止め・自己理解との一致／相違</span><textarea class="note" data-fld="understand" placeholder="所見について本人がどう受け止めたか、本人の自己理解との一致・相違を記録">'+esc(sub.understand||'')+'</textarea></div></div></div>';
  }

  function renderReport(sub){
    var meta=function(k,v){return '<div><div class="rep-lab">'+k+'</div><div class="rep-val">'+esc(v||'—')+'</div></div>';};
    var period=(sub.ps||'')+(sub.pe?(' 〜 '+sub.pe):(sub.ps?' 〜':''));
    // 実施記録テーブル
    var tables=DOMAINS.map(function(d){
      var rows=d.items.map(function(it){
        var p=pts(it),sel=sub.rec[it.id];
        var ptlist=LV.map(function(o){var on=sel===o.v;return '<span class="pt'+(on?' on':'')+'"><span class="mk">'+(on?'●':'○')+'</span>'+o.v+'：'+esc(p[o.v])+'</span>';}).join('');
        var col=sel?(LV.filter(function(o){return o.v===sel;})[0].color):'#c9d0d8';
        var cm=tx(sub.comments[it.id]);
        return '<tr><td class="c-item">'+esc(it.name)+'</td><td class="c-pt">'+ptlist+'</td><td class="c-ev">'+(sel?'<span class="evbadge" style="background:'+col+'">'+sel+'</span>':'—')+'</td><td class="c-cm">'+(cm||'')+'</td></tr>';
      }).join('');
      return '<div class="dgroup-h">'+d.no+' '+esc(d.name)+'</div><table class="rectbl"><thead><tr><th class="c-item">評価項目</th><th class="c-pt">評価ポイント</th><th class="c-ev">評価</th><th class="c-cm">コメント</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }).join('<div style="height:12px"></div>');

    // 補足echo
    var intentTags=sub.intents.length?sub.intents.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join(''):'<span class="echo empty">（未選択）</span>';
    var hopeEcho=HOPE_FIELDS.map(function(f){var v=tx(sub.hope[f.k]);return '<div class="echo-h">'+esc(f.label)+'</div><div class="echo'+(v?'':' empty')+'">'+(v||'（未記入）')+'</div>';}).join('');
    var envTags=sub.envchips.length?sub.envchips.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join(''):'<span class="echo empty">（未選択）</span>';
    var envEcho=ENV_FIELDS.map(function(f){var v=tx(sub.envtext[f.k]);return '<div class="echo-h">'+esc(f.label)+'</div><div class="echo'+(v?'':' empty')+'">'+(v||'（未記入）')+'</div>';}).join('');
    var refs=DOMAINS.map(function(d){var a=refAvg(d,sub);var pct=a?(a/4*100):0;var col=a==null?'#c9d0d8':(a>=3.25?'#4f9d6b':a>=2.5?'#4f8fc9':a>=1.75?'#d49a3c':'#cf6a55');
      return '<div class="refscore"><div class="nm">'+esc(d.name)+'</div><div class="bar"><i style="width:'+pct+'%;background:'+col+'"></i></div><div class="av">'+(a!=null?a.toFixed(1)+' / 4':'—')+'</div></div>';}).join('');

    elMain.innerHTML='<div class="rep">'
      +'<div class="pcard"><div class="rep-h"><div><div class="rep-k">富士圏域共通様式</div><div class="rep-t">作業場面等の就労アセスメント実施記録</div></div></div>'
        +'<div class="rep-grid">'+meta('対象者名',sub.name)+meta('作業先（事業所・企業名）',sub.work)+meta('就労担当事業所',sub.prov)+meta('評価期間',period)+meta('担当者名',sub.staff)+'</div></div>'
      +'<div class="pcard">'+tables+'</div>'
      +'<div class="pcard"><div class="box-h">総評</div><textarea class="note" data-fld="soken" placeholder="作業面・生活面を踏まえた総合的な所見と、本人と協同して検討する進路の見立てを記入">'+esc(sub.soken||'')+'</textarea>'
        +'<div class="disc">就労選択支援は点数で進路を決める仕組みではありません。本人の希望・必要な配慮を踏まえ、本人と協同して選択肢を検討してください。</div></div>'
      +'<div class="sup-print"><div class="supdiv"></div><div class="suplabel">■ 以下は支援用の補足資料（提出様式の対象外）■</div>'
        +'<div class="pcard"><div class="box-h">参考スコア <span class="pill-tag sup">内部参考・A=4〜D=1</span></div>'+refs+'</div>'
        +'<div class="pcard"><div class="box-h">希望・ニーズ <span class="pill-tag sup">補足</span></div>'
          +'<div class="echo-h">障害の種類・程度／手帳等</div><div class="echo'+(tx(sub.disability)?'':' empty')+'">'+(tx(sub.disability)||'（未記入）')+'</div>'
          +hopeEcho+'<div class="echo-h">本人が関心を示した方向</div><div>'+intentTags+'</div></div>'
        +'<div class="pcard"><div class="box-h">必要な配慮・環境 <span class="pill-tag sup">補足</span></div><div class="echo-h">あると働きやすい環境・配慮</div><div>'+envTags+'</div>'+envEcho+'</div>'
        +'<div class="pcard"><div class="box-h">本人の受け止め <span class="pill-tag sup">補足</span></div><div class="echo'+(tx(sub.understand)?'':' empty')+'">'+(tx(sub.understand)||'（未記入）')+'</div></div>'
      +'</div>'
      +'<div class="hintnote no-print">入力は自動保存されます。「帳票を印刷」で提出様式（総評まで）＋補足を出力します。</div></div>';
  }

  function renderAll(){renderOptions();fillMeta();renderTabs();renderSidebar();renderMain();}

  function onNav(e){var t=e.target.closest('[data-view]');if(!t)return;state.view=t.getAttribute('data-view');renderTabs();renderSidebar();renderMain();elMain.scrollTop=0;if(window.innerWidth<860)window.scrollTo(0,0);}
  elSide.addEventListener('click',onNav);
  elTabs.addEventListener('click',onNav);

  elMain.addEventListener('click',function(e){
    var sub=cur();
    var b=e.target.closest('button.opt');
    if(b){var id=b.getAttribute('data-item'),v=b.getAttribute('data-val');if(sub.rec[id]===v)delete sub.rec[id];else sub.rec[id]=v;save();renderDomain(sub);renderSidebar();renderTabs();return;}
    var ch=e.target.closest('button.chip');
    if(ch){if(ch.hasAttribute('data-intent')){var t=ch.getAttribute('data-intent'),i=sub.intents.indexOf(t);if(i>=0)sub.intents.splice(i,1);else sub.intents.push(t);}
      else if(ch.hasAttribute('data-envchip')){var t2=ch.getAttribute('data-envchip'),j=sub.envchips.indexOf(t2);if(j>=0)sub.envchips.splice(j,1);else sub.envchips.push(t2);}
      ch.classList.toggle('sel');save();renderSidebar();return;}
  });
  elMain.addEventListener('input',function(e){
    var t=e.target,sub=cur();
    if(t.hasAttribute('data-cm'))sub.comments[t.getAttribute('data-cm')]=t.value;
    else if(t.hasAttribute('data-hope'))sub.hope[t.getAttribute('data-hope')]=t.value;
    else if(t.hasAttribute('data-env'))sub.envtext[t.getAttribute('data-env')]=t.value;
    else if(t.hasAttribute('data-meta'))sub[t.getAttribute('data-meta')]=t.value;
    else if(t.getAttribute('data-fld')==='soken')sub.soken=t.value;
    else if(t.getAttribute('data-fld')==='understand')sub.understand=t.value;
    else return;
    save();
  });

  elSel.addEventListener('change',function(){state.currentId=elSel.value;save();renderAll();});
  META.forEach(function(k){metaEls[k].addEventListener('input',function(){cur()[k]=metaEls[k].value;save();if(k==='name')renderOptions();});});

  $('btnNew').addEventListener('click',function(){var s=blank();state.subjects.push(s);state.currentId=s.id;state.view='r1';save();renderAll();});
  $('btnDel').addEventListener('click',function(){if(!confirm('現在の対象者の記録を削除しますか？元に戻せません。'))return;state.subjects=state.subjects.filter(function(s){return s.id!==state.currentId;});if(!state.subjects.length)state.subjects=[blank()];state.currentId=state.subjects[0].id;save();renderAll();});
  $('btnClear').addEventListener('click',function(){if(!confirm('現在の対象者の入力（評価・コメント・総評・補足）をすべてクリアしますか？'))return;var s=cur();var keep=normalize({id:s.id,name:s.name,work:s.work,prov:s.prov,ps:s.ps,pe:s.pe,staff:s.staff});state.subjects=state.subjects.map(function(x){return x.id===s.id?keep:x;});save();renderAll();});
  $('btnPrint').addEventListener('click',function(){state.view='report';renderTabs();renderSidebar();renderMain();setTimeout(function(){window.print();},250);});

  state=load();renderAll();
})();

if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
</body>
</html>
