<title>就労選択支援アセスメント</title>
<style>
  :root{ --accent:#2c6ad4; --ink:#1d2530; --muted:#707a86; --line:#e3e7ec; --bg:#eef1f4; --panel:#fff; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',YuGothic,'Noto Sans JP',Meiryo,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
  button{font-family:inherit;cursor:pointer;-webkit-appearance:none;-webkit-tap-highlight-color:transparent}
  input,select,textarea{font-family:inherit;-webkit-appearance:none;outline:none;font-size:16px;color:var(--ink)}
  textarea{resize:vertical}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  ::placeholder{color:#aab1ba}
  ::-webkit-scrollbar{height:7px;width:7px}
  ::-webkit-scrollbar-thumb{background:#d3d8de;border-radius:4px}

  .shell{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}

  /* header */
  header{display:flex;align-items:center;gap:10px;row-gap:8px;flex-wrap:wrap;padding:8px 16px;padding-top:calc(8px + env(safe-area-inset-top,0px));min-height:56px;background:var(--panel);border-bottom:1px solid var(--line);flex:0 0 auto}
  .brand{display:flex;align-items:center;gap:9px;flex:0 0 auto}
  .logo{width:30px;height:30px;border-radius:7px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;letter-spacing:.03em}
  .title{font-weight:700;font-size:15px;white-space:nowrap}
  .subjwrap{display:flex;align-items:center;gap:8px;flex:1 1 auto;min-width:150px}
  #subjectSelect{height:38px;padding:0 12px;border:1px solid #d8dde3;border-radius:9px;font-size:14px;background:#fff;flex:1 1 auto;min-width:120px;max-width:220px}
  .hbtn{height:38px;padding:0 13px;border:1px solid #d8dde3;border-radius:9px;background:#fff;font-size:13px;font-weight:600;flex:0 0 auto}
  .hbtn.ghost{color:var(--muted);font-weight:500}
  .hbtn.add{color:var(--accent)}
  .hbtn.primary{border:none;background:var(--accent);color:#fff;font-weight:700;padding:0 16px}
  .hactions{display:flex;align-items:center;gap:8px;flex:0 0 auto}

  /* mobile tabs */
  .tabs{display:none;gap:8px;overflow-x:auto;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--line);flex:0 0 auto;-webkit-overflow-scrolling:touch}
  .pill{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:0 13px;height:40px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap;border:1px solid var(--line);background:#fff;color:#5b646f}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .pill-num{width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#e7ebf0;color:#707a86}
  .pill.active .pill-num{background:rgba(255,255,255,.25);color:#fff}
  .pill-avg{font-weight:700;font-variant-numeric:tabular-nums}

  /* meta */
  .meta{display:flex;align-items:center;gap:18px;row-gap:10px;flex-wrap:wrap;padding:10px 22px;background:#f7f9fb;border-bottom:1px solid var(--line);flex:0 0 auto}
  .field{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
  .field input{height:34px;padding:0 11px;border:1px solid #d8dde3;border-radius:8px;font-size:14px;width:150px}

  .body{display:flex;flex:1}
  .sidebar{display:flex;flex-direction:column;gap:7px;width:252px;flex:0 0 auto;background:#f7f9fb;border-right:1px solid var(--line);overflow:auto;padding:14px}
  .side-h{font-size:11px;font-weight:700;color:#9aa3ad;letter-spacing:.06em;padding:2px 4px 4px}
  .nav{display:flex;flex-direction:column;gap:7px;padding:11px 12px;border-radius:9px;border:1px solid transparent;cursor:pointer}
  .nav.active{background:#fff;border-color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .nav-top{display:flex;align-items:center;gap:9px}
  .nav-num{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#e7ebf0;color:#707a86;flex:0 0 auto}
  .nav.active .nav-num{background:var(--accent);color:#fff}
  .nav-name{font-size:13px;font-weight:600;flex:1;line-height:1.3}
  .nav-avg{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums}
  .nav-row2{display:flex;align-items:center;gap:8px;padding-left:31px}
  .nav-bar{flex:1;height:5px;background:#e7ebf0;border-radius:3px;overflow:hidden}
  .nav-bar i{display:block;height:100%;border-radius:3px}
  .nav-prog{font-size:11px;color:#9aa3ad;white-space:nowrap}
  .navdiv{height:1px;background:var(--line);margin:6px 2px}
  .nav-sum-ic{width:22px;height:22px;border-radius:6px;background:#eef2f8;color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;flex:0 0 auto}
  .nav-tick{font-size:12px;color:#4f9d6b;font-weight:700;margin-left:auto}
  .nav-legal{font-size:10px;color:var(--accent);background:#eef2f8;border-radius:5px;padding:1px 6px;font-weight:600}
  .overall{margin-top:auto;padding:13px 14px;border-radius:9px;background:#fff;border:1px solid var(--line)}
  .overall-top{display:flex;justify-content:space-between;align-items:baseline}
  .overall-num{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
  .overall-sub{font-size:11px;color:#9aa3ad;margin-top:5px}

  .main{flex:1;min-width:0;overflow:visible;padding:24px 28px;padding-bottom:calc(28px + env(safe-area-inset-bottom,0px));background:var(--bg)}
  .page{max-width:880px;margin:0 auto}
  .dhead{display:flex;align-items:flex-end;gap:13px;margin-bottom:16px}
  .dhead-num{min-width:38px;height:38px;padding:0 8px;border-radius:9px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex:0 0 auto}
  .dhead-name{font-size:18px;font-weight:700;line-height:1.25}
  .dhead-desc{font-size:12.5px;color:var(--muted);margin-top:2px}
  .dhead-prog{font-size:12px;color:#9aa3ad;white-space:nowrap;margin-left:auto}
  .legal-pill{display:inline-block;font-size:11px;color:var(--accent);background:#eef2f8;border-radius:6px;padding:2px 8px;margin-left:8px;font-weight:600;vertical-align:middle}
  .items{display:flex;flex-direction:column;gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px}
  .card-h{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .card-name{font-size:15px;font-weight:600}
  .card-hint{font-size:12.5px;color:#8a929c}
  .scale{display:flex;flex-wrap:wrap;gap:8px;align-items:stretch}
  .opt{flex:1 1 60px;display:flex;align-items:center;justify-content:center;gap:7px;min-height:46px;padding:8px 6px;border-radius:9px;font-size:12.5px;font-weight:600;line-height:1.2;border:1px solid #d8dde3;background:#fff;color:#5b646f;transition:all .12s}
  .opt.sel{border-color:var(--c);background:var(--c);color:#fff}
  .opt-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex:0 0 auto}
  .opt.sel .opt-num{background:rgba(255,255,255,.28)!important}
  .opt.na{flex:0 0 auto;padding:0 16px;color:#8a929c}
  .opt.na.sel{border-color:#9aa3ad;background:#9aa3ad;color:#fff}
  .memo{margin-top:11px;width:100%;min-height:42px;padding:9px 11px;border:1px solid #e7ebf0;border-radius:9px;font-size:14px;background:#fafbfc;line-height:1.55}
  /* 協同評価2行 */
  .rater{margin-top:9px}
  .rater-lab{font-size:11.5px;font-weight:700;color:#707a86;margin-bottom:5px;display:flex;align-items:center;gap:6px}
  .rater-lab .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .rater.self .dot{background:#5b94c9}
  .rater.staff .dot{background:#4f9d6b}
  /* 希望/環境フォーム */
  .form{display:flex;flex-direction:column;gap:15px}
  .ffield{display:flex;flex-direction:column;gap:6px}
  .ffield .fl{font-size:13.5px;font-weight:600;color:var(--ink)}
  .ffield .fl small{font-weight:500;color:#8a929c;font-size:11.5px}
  .ffield textarea{min-height:62px;padding:10px 12px;border:1px solid #d8dde3;border-radius:9px;font-size:15px;line-height:1.55;background:#fff}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:8px 14px;border:1px solid #d8dde3;border-radius:20px;background:#fff;font-size:13px;color:#5b646f}
  .chip.sel{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

  /* summary */
  .sum{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
  .rec-h{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:1px solid #eef1f4;padding-bottom:15px;margin-bottom:15px}
  .rec-k{font-size:12px;color:#9aa3ad;letter-spacing:.06em}
  .rec-t{font-size:21px;font-weight:700;margin-top:3px}
  .rec-ov{text-align:right;flex:0 0 auto}
  .rec-ov .n{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.05}
  .rec-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .rec-lab{font-size:11px;color:#9aa3ad;margin-bottom:4px}
  .rec-val{font-size:14px;font-weight:600;border-bottom:1px solid #eef1f4;padding-bottom:5px;min-height:24px}
  .box-h{font-size:13px;font-weight:700;margin-bottom:14px}
  .box-h .legal-pill{margin-left:6px}
  .legal{list-style:none;margin:0;padding:0}
  .legal li{display:flex;gap:10px;font-size:13px;padding:9px 0;border-top:1px solid #f1f3f6;line-height:1.5}
  .legal li:first-child{border-top:none}
  .legal .k{font-weight:700;color:var(--accent);flex:0 0 auto;width:18px}
  .echo-h{font-size:12.5px;font-weight:700;color:#5b646f;margin:12px 0 3px}
  .echo-h:first-of-type{margin-top:0}
  .echo{font-size:13.5px;line-height:1.65;white-space:pre-wrap;color:var(--ink)}
  .echo.empty{color:#bcc3cb}
  .tagrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
  .tag{font-size:12px;padding:4px 11px;border-radius:13px;background:#eef2f8;color:var(--accent);font-weight:600}
  .sum-2{display:flex;gap:16px;flex-wrap:wrap}
  .radarbox{flex:1 1 290px;display:flex;flex-direction:column;align-items:center}
  .radarbox svg{max-width:360px;width:100%;display:block}
  .scorebox{flex:1 1 360px}
  .srow{display:flex;align-items:center;gap:12px;margin-bottom:13px}
  .srow .nm{font-size:13px;flex:0 0 118px;line-height:1.25}
  .srow .bar{flex:1;height:9px;background:#eef1f4;border-radius:5px;overflow:hidden}
  .srow .bar i{display:block;height:100%;border-radius:5px}
  .srow .av{font-size:14px;font-weight:700;width:34px;text-align:right;font-variant-numeric:tabular-nums}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:16px;padding-top:13px;border-top:1px solid #f1f3f6}
  .leg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted)}
  .leg span{width:10px;height:10px;border-radius:3px;display:inline-block}
  .dsum-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .dsum-num{width:26px;height:26px;border-radius:7px;background:#eef2f8;color:var(--accent);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .dsum-name{font-size:15px;font-weight:700;flex:1}
  .dsum-avk{font-size:11px;color:#9aa3ad}
  .dsum-av{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
  .irow{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;padding:9px 0;border-top:1px solid #f1f3f6}
  .irow .nm{font-size:13.5px;font-weight:500}
  .irow .mm{font-size:12px;color:#8a929c;margin-top:4px;line-height:1.5}
  .irow .selfnote{font-size:11.5px;color:#5b94c9;margin-top:3px}
  .badges{display:flex;gap:6px;align-items:center;flex:0 0 auto}
  .badge{display:inline-block;padding:4px 12px;border-radius:13px;font-size:12px;font-weight:600;color:#fff;white-space:nowrap}
  .badge.none{color:#aab1ba;background:#fff;border:1px solid var(--line);padding:3px 11px}
  .note{width:100%;min-height:100px;padding:12px 14px;border:1px solid #e7ebf0;border-radius:9px;font-size:14px;line-height:1.7;background:#fafbfc}
  .note.sm{min-height:62px}
  .disc{font-size:11.5px;color:#7a3a1c;background:#fbf2ec;border:1px dashed #e0b9a6;border-radius:9px;padding:9px 12px;margin-top:10px;line-height:1.6}
  .hintnote{font-size:11.5px;color:#9aa3ad;text-align:center;padding:4px 0 14px}

  @media (min-width:860px){
    .shell{height:100vh;overflow:hidden}
    .body{min-height:0}
    .main{overflow:auto}
  }
  @media (max-width:859px){
    .sidebar{display:none}
    .tabs{display:flex}
    .main{padding:16px 14px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0px))}
    .rec-grid{grid-template-columns:1fr 1fr}
  }
  @media (max-width:559px){
    .title{font-size:14px}
    .meta{flex-direction:column;align-items:stretch;gap:10px;padding:12px 16px}
    .field{width:100%}
    .field input{flex:1;width:auto;height:42px}
    .opt{flex-direction:column;gap:3px;font-size:11.5px;flex-basis:56px}
    .srow .nm{flex-basis:96px}
  }

  @page{margin:13mm}
  @media print{
    .no-print{display:none!important}
    .shell{height:auto!important;display:block!important}
    .body{display:block!important}
    .sidebar,.tabs{display:none!important}
    .main{overflow:visible!important;padding:0!important;background:#fff!important}
    body{background:#fff!important}
    .pcard{box-shadow:none!important;break-inside:avoid;border:1px solid #ccc}
    .hintnote{display:none}
  }
</style>
</head>
<body>
<div class="shell">
  <header class="no-print">
    <div class="brand"><div class="logo">NEST</div><div class="title">就労選択支援アセスメント</div></div>
    <div class="subjwrap">
      <select id="subjectSelect"></select>
      <button class="hbtn add" id="btnNew">＋ 新規</button>
      <button class="hbtn ghost" id="btnDel">削除</button>
    </div>
    <div class="hactions">
      <button class="hbtn ghost" id="btnClear">入力をクリア</button>
      <button class="hbtn primary" id="btnPrint">総合帳票を印刷</button>
    </div>
  </header>

  <nav class="tabs no-print" id="tabs"></nav>

  <div class="meta no-print">
    <label class="field">氏名<input id="inpName" placeholder="氏名を入力"></label>
    <label class="field">実施日<input id="inpDate" type="date"></label>
    <label class="field">担当<input id="inpStaff" placeholder="担当者名"></label>
    <label class="field">作業<input id="inpTask" placeholder="観察した作業"></label>
    <label class="field">障害種別<input id="inpDisab" placeholder="例）療育B／精神2級"></label>
  </div>

  <div class="body">
    <aside class="sidebar no-print" id="sidebar"></aside>
    <main class="main" id="main"></main>
  </div>
</div>

<script>
(function(){
  "use strict";
  var KEY='nest_assessment_v3';
  var SCALE=[
    {v:1,label:'要支援',color:'#cf6a55'},
    {v:2,label:'一部支援',color:'#d49a3c'},
    {v:3,label:'概ね可',color:'#5b94c9'},
    {v:4,label:'安定',color:'#4f9d6b'}
  ];
  /* Ⅱ 基本的事項（JEED：作業遂行・職業生活・対人関係 を5領域に展開） */
  var DOMAINS=[
    {id:'d1',no:1,name:'基本的な労働習慣',short:'労働習慣',desc:'通所・時間・身だしなみなど、働く土台の部分。',items:[
      {id:'d1i1',name:'継続した通所',hint:'安定して通えるか'},
      {id:'d1i2',name:'時間・約束を守る',hint:'開始時間・休憩のけじめ'},
      {id:'d1i3',name:'身だしなみ・準備',hint:'作業に適した状態で臨めるか'},
      {id:'d1i4',name:'指示の受け入れ',hint:'指示や注意を素直に受け止められるか'}
    ]},
    {id:'d2',no:2,name:'作業遂行能力',short:'作業遂行',desc:'正確さ・速さ・段取りなど、仕事を進める力。選択支援の中核。',items:[
      {id:'d2i1',name:'作業の正確さ',hint:'ミスなく丁寧に進められるか'},
      {id:'d2i2',name:'作業の速さ・持続',hint:'一定のペースを保てるか'},
      {id:'d2i3',name:'手順の理解・記憶',hint:'手順を覚えて再現できるか'},
      {id:'d2i4',name:'集中力の持続',hint:'作業に集中し続けられるか'},
      {id:'d2i5',name:'報告・連絡・相談',hint:'進捗や困りごとを伝えられるか'}
    ]},
    {id:'d3',no:3,name:'対人関係・コミュニケーション',short:'対人関係',desc:'周囲とのやりとりや協調の力。',items:[
      {id:'d3i1',name:'あいさつ・受け答え',hint:'基本的なやりとりができるか'},
      {id:'d3i2',name:'意思・要望の表現',hint:'自分の考えを伝えられるか'},
      {id:'d3i3',name:'協調・周囲への配慮',hint:'周りに合わせて動けるか'},
      {id:'d3i4',name:'感情のコントロール',hint:'落ち着いて対応できるか'}
    ]},
    {id:'d4',no:4,name:'体調・健康管理',short:'体調管理',desc:'安定して働くための心身の管理。',items:[
      {id:'d4i1',name:'体調の安定',hint:'安定した状態で取り組めるか'},
      {id:'d4i2',name:'服薬・通院の管理',hint:'必要な健康管理ができるか'},
      {id:'d4i3',name:'疲労・ストレスへの対処',hint:'不調時に相談・対処できるか'},
      {id:'d4i4',name:'安全への意識',hint:'危険を避け安全に作業できるか'}
    ]},
    {id:'d5',no:5,name:'日常生活・自己管理',short:'生活管理',desc:'働く生活を支える土台。',items:[
      {id:'d5i1',name:'生活リズム',hint:'規則正しい生活ができるか'},
      {id:'d5i2',name:'金銭・持ち物の管理',hint:'必要な自己管理ができるか'},
      {id:'d5i3',name:'移動・通所手段',hint:'自力で通える手段があるか'},
      {id:'d5i4',name:'余暇・休息の取り方',hint:'オン・オフを切り替えられるか'}
    ]}
  ];
  var TOTAL=DOMAINS.reduce(function(a,d){return a+d.items.length;},0);

  /* Ⅰ 希望・ニーズ（法定②） */
  var HOPE_FIELDS=[
    {k:'history',label:'これまでの就労・実習・体験（職歴）',ph:'アルバイト・実習・前事業所など。期間や内容を本人の言葉で'},
    {k:'motive',label:'働く動機・目的',ph:'なぜ働きたいか（収入／生活リズム／人との関わり 等）'},
    {k:'wish',label:'希望する働き方・職種・仕事の内容',ph:'やってみたい仕事、避けたい仕事を本人の言葉で'},
    {k:'condition',label:'希望する労働条件・通勤',ph:'勤務時間・日数・曜日、通勤手段・通勤時間 等'},
    {k:'request',label:'配慮してほしいこと（合理的配慮の希望）',ph:'本人が希望する配慮・苦手なこと'},
    {k:'strength',label:'強み・得意なこと（ストレングス）',ph:'得意な作業・好きなこと・続けられること'},
    {k:'services',label:'現在利用している支援・サービス',ph:'相談支援・医療・家族・他事業所 等'},
    {k:'serious',label:'「真剣に働きたい」意欲をどう感じたか',sub:'支援員所見',ph:'工賃目当てか、働くこと自体への意欲か。観察された手がかり'}
  ];
  var INTENTS=['一般就労を目指したい','まず就労移行で力をつけたい','A型で働きながら','B型で自分のペースで','まだ決めかねている'];
  /* Ⅲ 就労継続のための環境・必要な配慮（法定③④） */
  var ENV_CHIPS=['静かな環境','少人数・個別','決まった手順','マイペースで進められる','こまめな声かけ','短時間から','休憩を取りやすい','視覚的な指示'];
  var ENV_FIELDS=[
    {k:'envNote',label:'作業環境・配慮の具体',ph:'作業面／コミュニケーション面／時間・ペース面で必要な配慮を具体的に'},
    {k:'commute',label:'通勤手段・移動の支援',ph:'通勤手段、移動の練習・支援の要否'},
    {k:'medical',label:'医療・生活面の支え',ph:'服薬・通院の管理、生活面で支えになっている人・サービス'}
  ];

  function today(){return new Date().toISOString().slice(0,10);}
  function uid(){return 's'+Date.now()+Math.floor(Math.random()*1000);}
  function normalize(s){
    s.id=s.id||uid();
    s.name=s.name||'';s.date=s.date||today();s.staff=s.staff||'';s.task=s.task||'';s.disability=s.disability||'';
    s.ratings=s.ratings||{};s.self=s.self||{};s.memos=s.memos||{};
    s.hope=s.hope||{};s.intents=s.intents||[];
    s.envchips=s.envchips||[];s.envtext=s.envtext||{};
    s.note=s.note||'';s.fb=s.fb||'';s.understand=s.understand||'';
    return s;
  }
  function blank(){return normalize({id:uid()});}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function txt(v){return (v&&String(v).trim())?esc(v):'';}

  var state;
  function load(){
    try{
      var raw=localStorage.getItem(KEY);
      if(raw){var d=JSON.parse(raw);if(d&&d.subjects&&d.subjects.length){
        d.subjects.forEach(normalize);
        var cid=d.currentId&&d.subjects.some(function(s){return s.id===d.currentId;})?d.currentId:d.subjects[0].id;
        return {subjects:d.subjects,currentId:cid,view:'hope'};
      }}
    }catch(e){}
    var s=blank();return {subjects:[s],currentId:s.id,view:'hope'};
  }
  function save(){try{localStorage.setItem(KEY,JSON.stringify({subjects:state.subjects,currentId:state.currentId}));}catch(e){}}
  function cur(){var c=state.subjects.filter(function(s){return s.id===state.currentId;})[0];return c||state.subjects[0];}

  function stat(d,sub){
    var vals=d.items.map(function(it){return sub.ratings[it.id];}).filter(function(v){return v>=1&&v<=4;});
    var rated=d.items.filter(function(it){return sub.ratings[it.id]!==undefined;}).length;
    var avg=vals.length?vals.reduce(function(a,b){return a+b;},0)/vals.length:null;
    return {avg:avg,rated:rated,total:d.items.length};
  }
  function scoreColor(avg){
    if(avg==null)return '#d3d8de';
    if(avg<1.75)return '#cf6a55';
    if(avg<2.5)return '#d49a3c';
    if(avg<3.25)return '#5b94c9';
    return '#4f9d6b';
  }
  function hopeFilled(sub){
    var any=HOPE_FIELDS.some(function(f){return sub.hope[f.k]&&sub.hope[f.k].trim();});
    return any||sub.intents.length>0;
  }
  function envFilled(sub){
    var any=ENV_FIELDS.some(function(f){return sub.envtext[f.k]&&sub.envtext[f.k].trim();});
    return any||sub.envchips.length>0;
  }

  // ---- elements
  var $=function(id){return document.getElementById(id);};
  var elSel=$('subjectSelect'),elTabs=$('tabs'),elSide=$('sidebar'),elMain=$('main');
  var elName=$('inpName'),elDate=$('inpDate'),elStaff=$('inpStaff'),elTask=$('inpTask'),elDisab=$('inpDisab');

  function renderOptions(){
    elSel.innerHTML=state.subjects.map(function(s){
      var lbl=(s.name&&s.name.trim())?s.name:'（無題）';
      return '<option value="'+esc(s.id)+'"'+(s.id===state.currentId?' selected':'')+'>'+esc(lbl)+'</option>';
    }).join('');
  }
  function fillMeta(){
    var s=cur();
    elName.value=s.name||'';elDate.value=s.date||'';elStaff.value=s.staff||'';elTask.value=s.task||'';elDisab.value=s.disability||'';
  }

  function secNav(view,icon,name,filled,legal){
    return '<div class="nav'+(state.view===view?' active':'')+'" data-view="'+view+'"><div class="nav-top">'
      +'<span class="nav-sum-ic">'+icon+'</span><span class="nav-name">'+esc(name)+'</span>'
      +(legal?'<span class="nav-legal">'+legal+'</span>':'')
      +(filled?'<span class="nav-tick">✓</span>':'')+'</div></div>';
  }
  function renderSidebar(){
    var sub=cur();var davgs=[];
    var nav=DOMAINS.map(function(d){
      var st=stat(d,sub);if(st.avg!=null)davgs.push(st.avg);
      var pct=st.avg!=null?(st.avg/4*100):0;
      return '<div class="nav'+(state.view===d.id?' active':'')+'" data-view="'+d.id+'">'
        +'<div class="nav-top"><span class="nav-num">'+d.no+'</span><span class="nav-name">'+esc(d.name)+'</span><span class="nav-avg">'+(st.avg!=null?st.avg.toFixed(1):'–')+'</span></div>'
        +'<div class="nav-row2"><div class="nav-bar"><i style="width:'+pct+'%;background:'+scoreColor(st.avg)+'"></i></div><span class="nav-prog">'+st.rated+'/'+st.total+'</span></div>'
        +'</div>';
    }).join('');
    var ov=davgs.length?(davgs.reduce(function(a,b){return a+b;},0)/davgs.length):null;
    var rated=DOMAINS.reduce(function(a,d){return a+stat(d,sub).rated;},0);
    elSide.innerHTML='<div class="side-h">Ⅰ 本人の希望・経験</div>'
      +secNav('hope','Ⅰ','希望・ニーズ',hopeFilled(sub),'法定②')
      +'<div class="side-h" style="margin-top:8px">Ⅱ 基本的事項（協同評価）</div>'+nav
      +'<div class="side-h" style="margin-top:8px">Ⅲ 環境・配慮</div>'
      +secNav('env','Ⅲ','就労継続の環境・配慮',envFilled(sub),'法定③④')
      +'<div class="navdiv"></div>'
      +secNav('summary','▣','総合帳票・協同所見',false,'')
      +'<div class="overall"><div class="overall-top"><span style="font-size:12px;color:var(--muted)">Ⅱ全体平均</span><span class="overall-num" style="color:'+scoreColor(ov)+'">'+(ov!=null?ov.toFixed(1):'–')+'</span></div><div class="overall-sub">協同評価済 '+rated+' / '+TOTAL+' 項目</div></div>';
  }

  function renderTabs(){
    var sub=cur();
    var t='<button class="pill'+(state.view==='hope'?' active':'')+'" data-view="hope">Ⅰ 希望</button>';
    t+=DOMAINS.map(function(d){
      var st=stat(d,sub);
      return '<button class="pill'+(state.view===d.id?' active':'')+'" data-view="'+d.id+'"><span class="pill-num">'+d.no+'</span>'+esc(d.short)+'<span class="pill-avg">'+(st.avg!=null?st.avg.toFixed(1):'–')+'</span></button>';
    }).join('');
    t+='<button class="pill'+(state.view==='env'?' active':'')+'" data-view="env">Ⅲ 環境</button>';
    t+='<button class="pill'+(state.view==='summary'?' active':'')+'" data-view="summary">▣ 帳票</button>';
    elTabs.innerHTML=t;
  }

  function radarSVG(sub){
    var n=DOMAINS.length,cx=180,cy=152,R=104,acc='#2c6ad4';
    function ang(i){return (-90+i*360/n)*Math.PI/180;}
    function pt(i,r){return [cx+r*Math.cos(ang(i)),cy+r*Math.sin(ang(i))];}
    var avgs=DOMAINS.map(function(d){return stat(d,sub).avg;});
    var out='<svg viewBox="0 0 360 300" role="img" aria-label="領域バランスのレーダーチャート">';
    [1,2,3,4].forEach(function(lv){
      out+='<polygon points="'+DOMAINS.map(function(_,i){return pt(i,R*lv/4).join(',');}).join(' ')+'" fill="none" stroke="#e6eaef" stroke-width="1"/>';
    });
    DOMAINS.forEach(function(_,i){var p=pt(i,R);out+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0]+'" y2="'+p[1]+'" stroke="#e6eaef" stroke-width="1"/>';});
    var dp=avgs.map(function(a,i){return pt(i,R*((a||0)/4));});
    out+='<polygon points="'+dp.map(function(p){return p.join(',');}).join(' ')+'" fill="'+acc+'26" stroke="'+acc+'" stroke-width="2" stroke-linejoin="round"/>';
    dp.forEach(function(p,i){if(avgs[i]!=null)out+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3.5" fill="'+acc+'"/>';});
    DOMAINS.forEach(function(d,i){
      var p=pt(i,R+17);var anchor=Math.abs(p[0]-cx)<6?'middle':(p[0]>cx?'start':'end');
      out+='<text x="'+p[0]+'" y="'+p[1]+'" font-size="12" font-weight="600" fill="#5b646f" text-anchor="'+anchor+'" dominant-baseline="middle">'+esc(d.short)+'</text>';
    });
    avgs.forEach(function(a,i){if(a==null)return;var p=pt(i,R*(a/4));out+='<text x="'+p[0]+'" y="'+(p[1]-9)+'" font-size="10.5" font-weight="700" fill="'+acc+'" text-anchor="middle">'+a.toFixed(1)+'</text>';});
    return out+'</svg>';
  }

  function renderMain(){
    var sub=cur();
    if(state.view==='summary'){renderSummary(sub);return;}
    if(state.view==='hope'){renderHope(sub);return;}
    if(state.view==='env'){renderEnv(sub);return;}
    renderDomain(sub);
  }

  function renderHope(sub){
    var fields=HOPE_FIELDS.map(function(f){
      return '<div class="ffield"><span class="fl">'+esc(f.label)+(f.sub?' <small>／ '+esc(f.sub)+'</small>':'')+'</span>'
        +'<textarea data-hope="'+f.k+'" placeholder="'+esc(f.ph)+'">'+esc(sub.hope[f.k]||'')+'</textarea></div>';
    }).join('');
    var chips=INTENTS.map(function(t){
      return '<button class="chip'+(sub.intents.indexOf(t)>=0?' sel':'')+'" data-intent="'+esc(t)+'">'+esc(t)+'</button>';
    }).join('');
    elMain.innerHTML='<div class="page"><div class="dhead"><div class="dhead-num">Ⅰ</div>'
      +'<div><div class="dhead-name">就労に関する希望・ニーズ<span class="legal-pill">法定②</span></div><div class="dhead-desc">本人がどう働きたいか・これまでの経験。本人本位の選択の起点です。</div></div></div>'
      +'<div class="card"><div class="form">'+fields
      +'<div class="ffield"><span class="fl">本人が関心を示した方向</span><div class="chips">'+chips+'</div></div>'
      +'</div></div></div>';
  }

  function renderEnv(sub){
    var chips=ENV_CHIPS.map(function(t){
      return '<button class="chip'+(sub.envchips.indexOf(t)>=0?' sel':'')+'" data-envchip="'+esc(t)+'">'+esc(t)+'</button>';
    }).join('');
    var fields=ENV_FIELDS.map(function(f){
      return '<div class="ffield"><span class="fl">'+esc(f.label)+'</span>'
        +'<textarea data-env="'+f.k+'" placeholder="'+esc(f.ph)+'">'+esc(sub.envtext[f.k]||'')+'</textarea></div>';
    }).join('');
    elMain.innerHTML='<div class="page"><div class="dhead"><div class="dhead-num">Ⅲ</div>'
      +'<div><div class="dhead-name">就労継続のための環境・必要な配慮<span class="legal-pill">法定③④</span></div><div class="dhead-desc">どんな環境・支援があれば力を発揮し、働き続けられるか。</div></div></div>'
      +'<div class="card"><div class="form">'
      +'<div class="ffield"><span class="fl">あると働きやすい環境・配慮 <small>／ 当てはまるものを選択</small></span><div class="chips">'+chips+'</div></div>'
      +fields+'</div></div></div>';
  }

  function optBtn(it,o,sel,kind){
    return '<button class="opt'+(sel?' sel':'')+'" data-item="'+it.id+'" data-val="'+o.v+'" data-kind="'+kind+'"'+(sel?' style="--c:'+o.color+'"':'')+'>'
      +'<span class="opt-num" style="background:'+o.color+'">'+o.v+'</span><span>'+esc(o.label)+'</span></button>';
  }
  function raterRow(it,kind,store){
    var c=store[it.id];
    var opts=SCALE.map(function(o){return optBtn(it,o,c===o.v,kind);}).join('');
    opts+='<button class="opt na'+(c===0?' sel':'')+'" data-item="'+it.id+'" data-val="0" data-kind="'+kind+'">該当外</button>';
    var lab=kind==='self'?'本人（自己評価）':'支援者（協同評価）';
    return '<div class="rater '+kind+'"><div class="rater-lab"><span class="dot"></span>'+lab+'</div><div class="scale">'+opts+'</div></div>';
  }
  function renderDomain(sub){
    var d=DOMAINS.filter(function(x){return x.id===state.view;})[0]||DOMAINS[0];
    var st=stat(d,sub);
    var cards=d.items.map(function(it){
      return '<div class="card"><div class="card-h"><span class="card-name">'+esc(it.name)+'</span><span class="card-hint">'+esc(it.hint)+'</span></div>'
        +raterRow(it,'self',sub.self)
        +raterRow(it,'staff',sub.ratings)
        +'<textarea class="memo" data-memo="'+it.id+'" rows="1" placeholder="観察メモ・本人と支援者で見立てが違った点など（任意）">'+esc(sub.memos[it.id]||'')+'</textarea></div>';
    }).join('');
    elMain.innerHTML='<div class="page"><div class="dhead"><div class="dhead-num">'+d.no+'</div>'
      +'<div><div class="dhead-name">'+esc(d.name)+'<span class="legal-pill">Ⅱ 基本的事項</span></div><div class="dhead-desc">'+esc(d.desc)+'　本人＝自己評価／支援者＝協同評価</div></div>'
      +'<div class="dhead-prog">協同 '+st.rated+' / '+st.total+'</div></div>'
      +'<div class="items">'+cards+'</div></div>';
  }

  function echo(label,val){
    var v=(val&&val.trim())?esc(val):'（未記入）';
    var cls=(val&&val.trim())?'echo':'echo empty';
    return '<div class="echo-h">'+esc(label)+'</div><div class="'+cls+'">'+v+'</div>';
  }
  function renderSummary(sub){
    var davgs=[];var rated=0;
    DOMAINS.forEach(function(d){var s=stat(d,sub);if(s.avg!=null)davgs.push(s.avg);rated+=s.rated;});
    var ov=davgs.length?(davgs.reduce(function(a,b){return a+b;},0)/davgs.length):null;
    var meta=function(k,v){return '<div><div class="rec-lab">'+k+'</div><div class="rec-val">'+esc(v||'—')+'</div></div>';};
    var srows=DOMAINS.map(function(d){var s=stat(d,sub);var pct=s.avg!=null?s.avg/4*100:0;
      return '<div class="srow"><div class="nm">'+esc(d.name)+'</div><div class="bar"><i style="width:'+pct+'%;background:'+scoreColor(s.avg)+'"></i></div><div class="av">'+(s.avg!=null?s.avg.toFixed(1):'–')+'</div></div>';
    }).join('');
    var legend=SCALE.map(function(o){return '<div class="leg"><span style="background:'+o.color+'"></span>'+o.v+' '+esc(o.label)+'</div>';}).join('');

    // 法定4事項
    var legal='<ul class="legal">'
      +'<li><span class="k">①</span><span>障害の種類及び程度 … '+(txt(sub.disability)||'<span style="color:#bcc3cb">（基本情報の障害種別に記入）</span>')+'</span></li>'
      +'<li><span class="k">②</span><span>就労に関する意向及び経験 … Ⅰ 希望・ニーズ（下記）</span></li>'
      +'<li><span class="k">③</span><span>就労に必要な配慮及び支援 … Ⅲ 環境・配慮（下記）</span></li>'
      +'<li><span class="k">④</span><span>適切な作業の環境 … Ⅲ 環境・配慮／Ⅱ-2 作業遂行</span></li>'
      +'</ul>';

    // Ⅰ希望エコー
    var intentTags=sub.intents.length?'<div class="tagrow">'+sub.intents.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('')+'</div>':'';
    var hopeEcho=HOPE_FIELDS.map(function(f){return echo(f.label,sub.hope[f.k]);}).join('')
      +'<div class="echo-h">本人が関心を示した方向</div>'+(intentTags||'<div class="echo empty">（未選択）</div>');
    // Ⅲ環境エコー
    var envTags=sub.envchips.length?'<div class="tagrow">'+sub.envchips.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('')+'</div>':'<div class="echo empty">（未選択）</div>';
    var envEcho='<div class="echo-h">あると働きやすい環境・配慮</div>'+envTags
      +ENV_FIELDS.map(function(f){return echo(f.label,sub.envtext[f.k]);}).join('');

    // 領域別 詳細（協同＋本人）
    var details=DOMAINS.map(function(d){
      var s=stat(d,sub);
      var rows=d.items.map(function(it){
        var cc=sub.ratings[it.id],sc=sub.self[it.id];
        var so=null;SCALE.forEach(function(x){if(x.v===cc)so=x;});
        var isNa=cc===0;var label=isNa?'該当外':(so?so.label:'未評価');
        var clsB=(so||isNa)?'badge':'badge none';
        var bg=isNa?'#9aa3ad':(so?so.color:'');
        var selfLabel='';if(sc!==undefined){var ss=null;SCALE.forEach(function(x){if(x.v===sc)ss=x;});selfLabel=sc===0?'該当外':(ss?ss.label:'');}
        var selfNote=(sc!==undefined&&sc!==cc)?'<div class="selfnote">本人の自己評価：'+esc(selfLabel)+'</div>':'';
        var mm=(sub.memos[it.id]&&sub.memos[it.id].trim())?'<div class="mm">'+esc(sub.memos[it.id])+'</div>':'';
        return '<div class="irow"><div><div class="nm">'+esc(it.name)+'</div>'+selfNote+mm+'</div><div class="badges"><div class="'+clsB+'"'+(bg?' style="background:'+bg+'"':'')+'>'+esc(label)+'</div></div></div>';
      }).join('');
      return '<div class="pcard"><div class="dsum-h"><div class="dsum-num">'+d.no+'</div><div class="dsum-name">'+esc(d.name)+'</div><div class="dsum-avk">協同平均</div><div class="dsum-av">'+(s.avg!=null?s.avg.toFixed(1):'–')+'</div></div>'+rows+'</div>';
    }).join('');

    elMain.innerHTML='<div class="sum">'
      +'<div class="pcard"><div class="rec-h"><div><div class="rec-k">就労選択支援アセスメント</div><div class="rec-t">総合帳票・協同所見</div></div>'
        +'<div class="rec-ov"><div class="rec-lab">Ⅱ全体平均</div><div class="n" style="color:'+scoreColor(ov)+'">'+(ov!=null?ov.toFixed(1):'–')+'</div><div class="rec-lab">協同評価済 '+rated+' / '+TOTAL+'</div></div></div>'
        +'<div class="rec-grid">'+meta('氏名',sub.name)+meta('実施日',sub.date)+meta('担当',sub.staff)+meta('作業',sub.task)+meta('障害種別',sub.disability)+'</div></div>'
      +'<div class="pcard"><div class="box-h">厚生労働大臣の定める4事項の整理</div>'+legal+'</div>'
      +'<div class="pcard"><div class="box-h">Ⅰ 就労に関する希望・ニーズ<span class="legal-pill">法定②</span></div>'+hopeEcho+'</div>'
      +'<div class="sum-2"><div class="pcard radarbox"><div class="box-h" style="align-self:flex-start">Ⅱ 領域バランス</div>'+radarSVG(sub)+'</div>'
        +'<div class="pcard scorebox"><div class="box-h">Ⅱ 領域別スコア（協同評価）</div>'+srows+'<div class="legend">'+legend+'</div></div></div>'
      +details
      +'<div class="pcard"><div class="box-h">Ⅲ 就労継続のための環境・必要な配慮<span class="legal-pill">法定③④</span></div>'+envEcho+'</div>'
      +'<div class="pcard"><div class="box-h">協同所見（総合）</div><textarea class="note" id="noteArea" placeholder="本人と確認した適性・強み・必要な配慮・本人の希望と、推奨する選択肢とその理由を記入">'+esc(sub.note||'')+'</textarea>'
        +'<div class="box-h" style="margin-top:14px">本人へのフィードバック要旨</div><textarea class="note sm" id="fbArea" placeholder="本人に伝える前向きな見立てと次の一歩">'+esc(sub.fb||'')+'</textarea>'
        +'<div class="box-h" style="margin-top:14px">本人の受け止め・自己理解の一致</div><textarea class="note sm" id="undArea" placeholder="所見について本人がどう受け止めたか、本人の自己理解との一致・相違">'+esc(sub.understand||'')+'</textarea>'
        +'<div class="disc">就労選択支援は点数で進路を決める仕組みではありません。スコアはあくまで参考とし、本人の希望（Ⅰ）と必要な配慮（Ⅲ）を踏まえ、本人と協同して選択肢を検討してください。</div></div>'
      +'<div class="hintnote no-print">入力内容はこの端末に自動保存されます。「総合帳票を印刷」からPDF保存できます。</div>'
      +'</div>';
  }

  function renderAll(){renderOptions();fillMeta();renderTabs();renderSidebar();renderMain();}

  // ---- events
  function onNav(e){
    var t=e.target.closest('[data-view]');if(!t)return;
    state.view=t.getAttribute('data-view');
    renderTabs();renderSidebar();renderMain();
    elMain.scrollTop=0;
    if(window.innerWidth<860)window.scrollTo(0,0);
  }
  elSide.addEventListener('click',onNav);
  elTabs.addEventListener('click',onNav);

  elMain.addEventListener('click',function(e){
    var sub=cur();
    var b=e.target.closest('button.opt');
    if(b){
      var id=b.getAttribute('data-item'),v=parseInt(b.getAttribute('data-val'),10),kind=b.getAttribute('data-kind');
      var store=kind==='self'?sub.self:sub.ratings;
      if(store[id]===v)delete store[id];else store[id]=v;
      save();renderMain();renderSidebar();renderTabs();return;
    }
    var ch=e.target.closest('button.chip');
    if(ch){
      if(ch.hasAttribute('data-intent')){
        var t=ch.getAttribute('data-intent');var i=sub.intents.indexOf(t);
        if(i>=0)sub.intents.splice(i,1);else sub.intents.push(t);
      }else if(ch.hasAttribute('data-envchip')){
        var t2=ch.getAttribute('data-envchip');var j=sub.envchips.indexOf(t2);
        if(j>=0)sub.envchips.splice(j,1);else sub.envchips.push(t2);
      }
      ch.classList.toggle('sel');save();renderSidebar();return;
    }
  });
  elMain.addEventListener('input',function(e){
    var t=e.target,sub=cur();
    if(t.classList.contains('memo')){sub.memos[t.getAttribute('data-memo')]=t.value;save();}
    else if(t.hasAttribute('data-hope')){sub.hope[t.getAttribute('data-hope')]=t.value;save();}
    else if(t.hasAttribute('data-env')){sub.envtext[t.getAttribute('data-env')]=t.value;save();}
    else if(t.id==='noteArea'){sub.note=t.value;save();}
    else if(t.id==='fbArea'){sub.fb=t.value;save();}
    else if(t.id==='undArea'){sub.understand=t.value;save();}
  });

  elSel.addEventListener('change',function(){state.currentId=elSel.value;save();renderAll();});
  elName.addEventListener('input',function(){cur().name=elName.value;save();renderOptions();});
  elDate.addEventListener('input',function(){cur().date=elDate.value;save();});
  elStaff.addEventListener('input',function(){cur().staff=elStaff.value;save();});
  elTask.addEventListener('input',function(){cur().task=elTask.value;save();});
  elDisab.addEventListener('input',function(){cur().disability=elDisab.value;save();});

  $('btnNew').addEventListener('click',function(){var s=blank();state.subjects.push(s);state.currentId=s.id;state.view='hope';save();renderAll();});
  $('btnDel').addEventListener('click',function(){
    if(!confirm('現在の対象者の記録を削除しますか？この操作は元に戻せません。'))return;
    state.subjects=state.subjects.filter(function(s){return s.id!==state.currentId;});
    if(!state.subjects.length){var b=blank();state.subjects=[b];}
    state.currentId=state.subjects[0].id;save();renderAll();
  });
  $('btnClear').addEventListener('click',function(){
    if(!confirm('現在の対象者の入力（評価・希望・配慮・メモ・所見）をすべてクリアしますか？'))return;
    var s=cur();var keep={id:s.id,name:s.name,date:s.date,staff:s.staff,task:s.task,disability:s.disability};
    normalize(keep);
    state.subjects=state.subjects.map(function(x){return x.id===s.id?keep:x;});
    save();renderAll();
  });
  $('btnPrint').addEventListener('click',function(){
    state.view='summary';renderTabs();renderSidebar();renderMain();
    setTimeout(function(){window.print();},250);
  });

  state=load();renderAll();
})();

/* PWA: オフライン対応のサービスワーカー登録（file://やSW非対応では何もしない） */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});
}
</script>
</body>
</html>
